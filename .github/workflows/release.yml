name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Auto-bump patch version on every main push (skip if this is a tag push or a version bump commit)
      - name: Auto-bump version
        if: github.ref == 'refs/heads/main'
        id: bump
        run: |
          # Skip if the last commit was an auto-version bump (prevent infinite loop)
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == chore:\ bump\ version* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Read current version from Cargo.toml
          CURRENT=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update all three version files
          sed -i '' "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" src-tauri/Cargo.toml
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${NEW_VERSION}\"/" src-tauri/tauri.conf.json
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${NEW_VERSION}\"/" package.json

          # Also update Cargo.lock
          cd src-tauri && cargo update -p codegrid --precise "$NEW_VERSION" 2>/dev/null || true && cd ..

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      # Exit early if this was a version bump commit (the tag push will trigger a new run)
      - name: Check if should continue
        id: check
        run: |
          if [[ "${{ steps.bump.outputs.skip }}" == "true" ]]; then
            echo "continue=false" >> $GITHUB_OUTPUT
          else
            echo "continue=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Node.js
        if: steps.check.outputs.continue == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        if: steps.check.outputs.continue == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        if: steps.check.outputs.continue == 'true'
        run: npm ci

      - name: Import signing certificate
        if: steps.check.outputs.continue == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security set-keychain-settings -lut 21600 build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain-db
          security import certificate.p12 -k build.keychain-db -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain-db
          security list-keychains -d user -s build.keychain-db login.keychain-db
          rm certificate.p12

      - name: Build
        if: steps.check.outputs.continue == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Notarize
        if: steps.check.outputs.continue == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG=src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CodeGrid_*.dmg
          xcrun notarytool submit $DMG \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple $DMG

      - name: Get version
        if: steps.check.outputs.continue == 'true'
        id: version
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dmg=src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/CodeGrid_${VERSION}_aarch64.dmg" >> $GITHUB_OUTPUT

      # Create versioned release on the public repo
      - name: Publish release
        if: steps.check.outputs.continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          REPO="isaachorowitz/CodeGrid-Claude-Code-Terminal"
          VERSION=${{ steps.version.outputs.version }}
          TAG="v${VERSION}"
          DMG="${{ steps.version.outputs.dmg }}"
          # Delete existing release with same tag if any
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
          # Create release with DMG
          gh release create "$TAG" "$DMG" \
            --repo "$REPO" \
            --title "CodeGrid $TAG" \
            --notes "CodeGrid v${VERSION} — Signed and notarized for macOS." \
            --latest

      # Landing page dynamically fetches the latest release from GitHub API
      # No notification needed — it always serves the newest DMG automatically
